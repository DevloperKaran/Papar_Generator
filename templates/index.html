<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Question Paper Builder</title>

<style>

  .card, .folder, button {
    touch-action: manipulation; /* Optimizes for mobile taps */
    user-select: none; /* Prevents text selection while clicking */
}
button:active {
    transform: scale(0.95); /* Visual feedback that the click worked */
    background: #388E3C;
  }
  
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#121212;
color:white;
height:100vh;
overflow:hidden;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.column{
width:50%;
overflow-y:auto;
padding:10px;
}

.left{
border-right:1px solid #333;
}

h3{
margin-bottom:10px;
}

.folder{
background:#1e1e1e;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#2a2a2a;
}

.paper-card{
background:#263238;
}

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#1b1b1b;
display:flex;
justify-content:center;
align-items:center;
border-top:1px solid #333;
}

but/* Slim Architect Header Bar */
.karan-header-bar {
    width: 100%;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    border-top: 3px solid #4CAF50;
    padding: 8px 0;
    text-align: center;
}

.header-content {
    display: flex;
    justify-content: space-around;
    align-items: center;
    max-width: 600px;
    margin: 0 auto;
}

.main-title {
    font-size: 14px;
    font-weight: bold;
    color: #4CAF50;
    letter-spacing: 2px;
}

.sys-tag, .dev-tag {
    font-size: 10px;
    font-family: monospace;
    color: #888;
}

.dev-tag {
    color: #fff;
    font-weight: bold;
}

.heart-pulse {
    color: #ff5252;
    display: inline-block;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* Fix the layout so it doesn't overlap */
.container {
    height: calc(100vh - 120px) !important; /* Adjust based on your footer height */
    margin-top: 0;
}
ton{
width:90%;
height:50px;
font-size:18px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-weight:bold;
cursor:pointer;
}

  
</style>

</head>


<body>



    <div class="header-right">
        <span class="label">V_BUILD:</span>
        <span class="value">1.0.4-STABLE</span>
    </div>
</div>
  
<div class="container">

<div class="column left">

<h3>Folders</h3>

<div id="folderList">

{% for f in folders %}

<div class="folder" onclick="openFolder('{{f}}')">
📂 {{f}}
</div>

{% endfor %}

</div>

<h3>Questions</h3>

<div id="questionBank"></div>

</div>
<div class="anime-footer">


<div class="column">

<h3>New Paper</h3>

<div id="paperArea"></div>

</div>

</div>


<div class="footer">
<button onclick="generatePaper()">Generate Paper</button>
</div>


<script>

let questionBank = document.getElementById("questionBank");
let paperArea = document.getElementById("paperArea");
let generateBtn = document.querySelector(".footer button");

// 1. OPEN FOLDER WITH LOADING STATE
function openFolder(folder) {
    // Visual feedback: clear bank and show loading
    questionBank.innerHTML = "<div class='card' style='text-align:center; opacity:0.6;'>⏳ Loading Questions...</div>";
    
    fetch("/load/" + folder)
        .then(res => {
            if (!res.ok) throw new Error("Server error");
            return res.json();
        })
        .then(data => {
            questionBank.innerHTML = "";
            
            if (Object.keys(data).length === 0) {
                questionBank.innerHTML = "<div class='card'>Empty folder or no .docx files found.</div>";
                return;
            }

            for (let id in data) {
                let div = document.createElement("div");
                div.className = "card";
                div.dataset.id = id;
                div.innerText = data[id];
                
                // Add click effect
                div.onclick = function() {
                    addQuestion(id, data[id]);
                    // Brief flash effect
                    div.style.background = "#4CAF50";
                    setTimeout(() => div.style.background = "#1e1e1e", 100);
                };
                questionBank.appendChild(div);
            }
        })
        .catch(err => {
            questionBank.innerHTML = "<div class='card' style='color:#ff5252;'>❌ Error: Check your Flask server</div>";
            console.error(err);
        });
}

// 2. ADD QUESTION TO NEW PAPER
function addQuestion(id, text) {
    let div = document.createElement("div");
    div.className = "card paper-card";
    div.dataset.id = id;
    div.innerText = text;

    div.onclick = function() {
        div.remove();
    };

    paperArea.appendChild(div);
    // Auto-scroll to bottom of paper area
    paperArea.scrollTop = paperArea.scrollHeight;
}

// 3. GENERATE PAPER (FIXES HANGING/LAG)
function generatePaper() {
    let ids = [];
    document.querySelectorAll("#paperArea .card").forEach(el => {
        ids.push(el.dataset.id);
    });

    if (ids.length === 0) {
        alert("Add some questions to your paper first!");
        return;
    }

    // Disable button to prevent double-clicks and lag
    generateBtn.disabled = true;
    generateBtn.innerText = "⏳ Generating .docx...";
    generateBtn.style.background = "#555";

    fetch("/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: ids })
    })
    .then(r => {
        if (!r.ok) throw new Error("Generation failed");
        return r.blob();
    })
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "question_paper.docx";
        document.body.appendChild(a);
        a.click();
        a.remove();
    })
    .catch(err => {
        alert("Failed to generate file. Is the server running?");
    })
    .finally(() => {
        // Reset button
        generateBtn.disabled = false;
        generateBtn.innerText = "Generate Paper";
        generateBtn.style.background = "#4CAF50";
    });
}


</script>

</body>
  </html>
